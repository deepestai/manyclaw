<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkanoid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 2px solid #334;
      background: #1a1a2e;
    }
  </style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Config ---
const PADDLE_W = 100, PADDLE_H = 12, PADDLE_Y = 550;
const BALL_R = 8;
const BRICK_ROWS = 5, BRICK_COLS = 8;
const BRICK_W = 75, BRICK_H = 20, BRICK_PAD = 10;
const BRICK_OFFSET_TOP = 60, BRICK_OFFSET_LEFT = 47;
const LIVES = 3;
const BASE_SPEED = 5;

const ROW_COLORS = ['#ff4757','#ff7f50','#ffd700','#2ed573','#1e90ff'];

// --- State ---
let paddle, ball, bricks, score, lives, gameState, keys;

function init() {
  paddle = { x: canvas.width / 2 - PADDLE_W / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
  ball = { x: canvas.width / 2, y: PADDLE_Y - BALL_R - 2, vx: 0, vy: 0, attached: true };
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_OFFSET_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_OFFSET_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        color: ROW_COLORS[r],
        alive: true
      });
    }
  }
  score = 0;
  lives = LIVES;
  gameState = 'start';
  keys = {};
}

function launchBall() {
  if (ball.attached) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
    ball.vx = Math.cos(angle) * BASE_SPEED;
    ball.vy = Math.sin(angle) * BASE_SPEED;
    ball.attached = false;
    gameState = 'playing';
  }
}

function resetBall() {
  ball.x = paddle.x + paddle.w / 2;
  ball.y = PADDLE_Y - BALL_R - 2;
  ball.vx = 0; ball.vy = 0;
  ball.attached = true;
}

function update() {
  if (gameState !== 'playing' && gameState !== 'start') return;

  // Paddle movement
  const SPEED = 7;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddle.x -= SPEED;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x += SPEED;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

  // Ball follows paddle when attached
  if (ball.attached) {
    ball.x = paddle.x + paddle.w / 2;
    if (gameState === 'playing') ball.y = PADDLE_Y - BALL_R - 2;
    return;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R > canvas.width) { ball.x = canvas.width - BALL_R; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Bottom — lose life
  if (ball.y + BALL_R > canvas.height) {
    lives--;
    if (lives <= 0) {
      gameState = 'gameover';
    } else {
      resetBall();
      gameState = 'start';
    }
    return;
  }

  // Paddle collision
  if (ball.vy > 0 &&
      ball.y + BALL_R >= paddle.y &&
      ball.y - BALL_R <= paddle.y + paddle.h &&
      ball.x >= paddle.x &&
      ball.x <= paddle.x + paddle.w) {
    const hitPos = (ball.x - paddle.x) / paddle.w; // 0..1
    const angle = -Math.PI / 2 + (hitPos - 0.5) * Math.PI * 0.7;
    const speed = Math.hypot(ball.vx, ball.vy);
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
    ball.y = paddle.y - BALL_R;
  }

  // Brick collisions
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ball.x + BALL_R < b.x || ball.x - BALL_R > b.x + b.w) continue;
    if (ball.y + BALL_R < b.y || ball.y - BALL_R > b.y + b.h) continue;
    b.alive = false;
    score += 10;

    // Determine bounce direction
    const overlapLeft = ball.x + BALL_R - b.x;
    const overlapRight = b.x + b.w - (ball.x - BALL_R);
    const overlapTop = ball.y + BALL_R - b.y;
    const overlapBottom = b.y + b.h - (ball.y - BALL_R);
    const minOverlapX = Math.min(overlapLeft, overlapRight);
    const minOverlapY = Math.min(overlapTop, overlapBottom);
    if (minOverlapX < minOverlapY) ball.vx *= -1;
    else ball.vy *= -1;

    // Check win
    if (bricks.every(bk => !bk.alive)) {
      gameState = 'win';
    }
    break;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
  }

  // Paddle
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // HUD
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 15, 30);
  ctx.textAlign = 'right';
  ctx.fillText('Lives: ' + lives, canvas.width - 15, 30);

  // Overlay messages
  if (gameState === 'start') {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '20px monospace';
    ctx.fillText('Press SPACE to launch', canvas.width / 2, canvas.height / 2 + 80);
  }
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4757';
    ctx.font = '48px monospace';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#ffffff';
    ctx.font = '24px monospace';
    ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
    ctx.font = '18px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Press ENTER to restart', canvas.width / 2, canvas.height / 2 + 60);
  }
  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2ed573';
    ctx.font = '48px monospace';
    ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#ffffff';
    ctx.font = '24px monospace';
    ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
    ctx.font = '18px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Press ENTER to restart', canvas.width / 2, canvas.height / 2 + 60);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    if (gameState === 'start') launchBall();
  }
  if (e.key === 'Enter') {
    if (gameState === 'gameover' || gameState === 'win') {
      init();
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

init();
loop();
</script>
</body>
</html>
